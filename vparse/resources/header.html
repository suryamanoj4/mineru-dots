<html><head>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
<style>
  .link-block {
    border: 1px solid transparent;
    border-radius: 24px;
    background-color: rgba(54, 54, 54, 1);
    cursor: pointer !important;
  }
  .link-block:hover {
    background-color: rgba(54, 54, 54, 0.75) !important;
    cursor: pointer !important;
  }
  .external-link {
    display: inline-flex;
    align-items: center;
    height: 36px;
    line-height: 36px;
    padding: 0 16px;
    cursor: pointer !important;
  }
  .external-link,
  .external-link:hover {
    cursor: pointer !important;
  }
  a {
    text-decoration: none;
  }
</style></head>

<body>
  <div style="
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(45deg, #007bff 0%, #0056b3 100%);
      padding: 24px;
      gap: 24px;
      border-radius: 8px;
    ">
    <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      ">
      <div style="
          width: 132px;
          height: 132px;
          border-radius: 50%;
          border: 4px solid rgba(255, 255, 255, 0.9);
          background: rgba(255, 255, 255, 0.1);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
          overflow: hidden;
        ">
        <img
          src="{{VISWAM_LOGO_SRC}}"
          alt="Viswam Docs logo"
          style="
            width: 84%;
            height: 84%;
            object-fit: contain;
            object-position: center;
            display: block;
          "
        >
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px">
        <h1 style="
            font-size: 48px;
            color: #fafafa;
            margin: 0;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode',
              'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
          ">
          Viswam Docs Digitization Tool
        </h1>
      </div>
    </div>

    <p style="
        margin: 0;
        line-height: 1.6rem;
        font-size: 16px;
        color: #fafafa;
        opacity: 0.8;
      ">
        Intelligent document digitization for PDF and image workflows.<br>
        Extract structured content into Markdown and JSON with a streamlined VISWAM interface.
    </p>
    <style>
      .link-block {
        display: inline-block;
      }
      .link-block + .link-block {
        margin-left: 20px;
      }
    </style>

    <div class="column has-text-centered">
      <div class="publication-links">
        <span class="link-block">
          <a href="https://in.linkedin.com/company/viswamai" class="external-link button is-normal is-rounded is-dark" style="text-decoration: none; cursor: pointer">
            <span class="icon" style="margin-right: 4px">
              <i class="fas fa-building" style="color: white; margin-right: 4px"></i>
            </span>
            <span style="color: white">VISWAM AI</span>
          </a>
        </span>

      </div>
    </div>

    <!-- New Demo Links -->
  </div>


</body></html>
