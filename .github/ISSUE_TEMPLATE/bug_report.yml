name: 🐛 Bug Report
description: Create a bug report for VParse | VParse 的 Bug 反馈
labels: bug

# We omit `title: "..."` so that the field defaults to blank. If we set it to
# empty string, Github seems to reject this .yml file.

body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a VParse 🐛 Bug Report! | 感谢您提交 VParse 🐛 Bug 反馈！

  - type: checkboxes
    attributes:
      label: 🔎 Search before asking
      description: >
        Please search the VParse [Readme](https://github.com/opendatalab/VParse), [Issues](https://github.com/opendatalab/VParse/issues) and [Discussions](https://github.com/opendatalab/VParse/discussions) to see if a similar bug report already exists.
      options:
        - label: I have searched the VParse [Readme](https://github.com/opendatalab/VParse) and found no similar bug report.
          required: true
        - label: I have searched the VParse [Issues](https://github.com/opendatalab/VParse/issues) and found no similar bug report.
          required: true
        - label: I have searched the VParse [Discussions](https://github.com/opendatalab/VParse/discussions) and found no similar bug report.
          required: true

  - type: checkboxes
    attributes:
      label: 🤖 Consult the online AI assistant for assistance
      description: >
        This [online AI assistant](https://deepwiki.com/opendatalab/VParse) is specifically trained to help with VParse and related topics! It's available 24/7 and ready to provide insights.
      options:
        - label: I have consulted the [online AI assistant](https://deepwiki.com/opendatalab/VParse) but was unable to obtain a solution to the issue.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the bug
      description: |
        Provide console output with error messages and/or screenshots of the bug.
      placeholder: |
        💡 ProTip! Include as much information as possible (screenshots, logs, tracebacks etc.) to receive the most helpful response.
    validations:
      required: true
  
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce the bug
      
      # Should not word-wrap this description here.
      description: |
        If you have questions about the parsing results or encounter errors during execution:
        * Provide a minimal reproducible example. 
        * The demo should include the complete steps, code, and the PDF file to be parsed.
        * When reporting parsing result anomalies and runtime errors, reproducible PDF files are essential. If the document is too large or confidential, you can print the problematic page(s) via the browser and submit the corresponding example file.
        
        
        For problems when building or installing VParse: | 在构建或安装 VParse 时遇到的问题:
        * Give the **exact** build/install commands that were run. | 提供**确切**的构建/安装命令。
        * Give the **complete** output from these commands. | 提供这些命令的**完整**输出。
  
    validations:
      required: true

#  - type: markdown
#    attributes:
#      value: |
#        # The information below is required.


  - type: dropdown
    id: os_mode
    attributes:
      label: Operating System Mode
      #multiple: true
      options:
        -
        - Windows
        - Linux
        - MacOS
    validations:
      required: true

  - type: textarea
    id: os_name_version
    attributes:
      label: Operating System Version
      #multiple: true
      description: |
        * If you are using a Linux system, please provide the Linux distribution and version number to help developers troubleshoot the issue.
        * If you are using a Windows or MacOS system, please provide the version number of the operating system to help developers troubleshoot the issue.
        * For example: Ubuntu 22.04, CentOS 7.9, MacOS 15.1, Windows 11.

    validations:
      required: true

  - type: dropdown
    id: python_version
    attributes:
      label: Python version
      #multiple: true
      # Need quotes around `3.10` otherwise it is treated as a number and shows as `3.1`.
      options:
        -
        - "3.13"
        - "3.12"
        - "3.11"
        - "3.10"
    validations:
      required: true

  - type: dropdown
    id: software_version
    attributes:
      label: Software version | 软件版本 (vparse --version)
      #multiple: false
      options:
        -
        - "`<2.2.0`"
        - "`2.2.x`"
        - "`>=2.5`"
    validations:
      required: true

  - type: dropdown
    id: backend_name
    attributes:
      label: Backend name
      #multiple: false
      options:
        -
        - "vlm"
        - "pipeline"
    validations:
      required: true

  - type: dropdown
    id: device_mode
    attributes:
      label: Device mode
      #multiple: true
      options:
        -
        - cpu
        - cuda
        - mps
        - npu
    validations:
      required: true
