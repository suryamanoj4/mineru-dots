services:
  mineru-api-cpu:
    profiles: ["cpu"]
    build:
      context: ..
      dockerfile: docker/global/Dockerfile.cpu
    container_name: mineru-api-cpu
    restart: always
    ports:
      - "8000:8000"
    environment:
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PREFETCH_MODELS: pipeline
      MINERU_TOOLS_CONFIG_JSON: /root/.mineru/mineru.json
      MINERU_API_ENABLE_FASTAPI_DOCS: "1"
    entrypoint:
      - /bin/bash
      - /app/docker/global/start-with-models.sh
    command:
      - mineru-api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    volumes:
      - mineru-hf-cache:/root/.cache/huggingface
      - mineru-ms-cache:/root/.cache/modelscope
      - mineru-config:/root/.mineru

  mineru-gradio-cpu:
    profiles: ["cpu"]
    build:
      context: ..
      dockerfile: docker/global/Dockerfile.cpu
    container_name: mineru-gradio-cpu
    restart: always
    depends_on:
      - mineru-api-cpu
    ports:
      - "7860:7860"
    environment:
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PREFETCH_MODELS: none
      MINERU_TOOLS_CONFIG_JSON: /root/.mineru/mineru.json
      MINERU_GRADIO_BACKEND_OPTIONS: pipeline
      MINERU_GRADIO_DEFAULT_BACKEND: pipeline
      MINERU_GRADIO_BACKEND_API_URL: http://mineru-api-cpu:8000
    entrypoint:
      - /bin/bash
      - /app/docker/global/start-with-models.sh
    command:
      - mineru-gradio
      - --server-name
      - 0.0.0.0
      - --server-port
      - "7860"
    volumes:
      - mineru-hf-cache:/root/.cache/huggingface
      - mineru-ms-cache:/root/.cache/modelscope
      - mineru-config:/root/.mineru

  mineru-api-gpu:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: docker/global/Dockerfile
    container_name: mineru-api-gpu
    restart: always
    ports:
      - "8000:8000"
    environment:
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PREFETCH_MODELS: vlm
      MINERU_TOOLS_CONFIG_JSON: /root/.mineru/mineru.json
      MINERU_API_ENABLE_FASTAPI_DOCS: "1"
    entrypoint:
      - /bin/bash
      - /app/docker/global/start-with-models.sh
    command:
      - mineru-api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.5"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    volumes:
      - mineru-hf-cache:/root/.cache/huggingface
      - mineru-ms-cache:/root/.cache/modelscope
      - mineru-config:/root/.mineru
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  mineru-gradio-gpu:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: docker/global/Dockerfile.cpu
    container_name: mineru-gradio-gpu
    restart: always
    depends_on:
      - mineru-api-gpu
    ports:
      - "7860:7860"
    environment:
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PREFETCH_MODELS: none
      MINERU_TOOLS_CONFIG_JSON: /root/.mineru/mineru.json
      MINERU_GRADIO_BACKEND_OPTIONS: vlm-auto-engine
      MINERU_GRADIO_DEFAULT_BACKEND: vlm-auto-engine
      MINERU_GRADIO_BACKEND_API_URL: http://mineru-api-gpu:8000
    entrypoint:
      - /bin/bash
      - /app/docker/global/start-with-models.sh
    command:
      - mineru-gradio
      - --server-name
      - 0.0.0.0
      - --server-port
      - "7860"
    volumes:
      - mineru-hf-cache:/root/.cache/huggingface
      - mineru-ms-cache:/root/.cache/modelscope
      - mineru-config:/root/.mineru

  mineru-api-hybrid:
    profiles: ["hybrid"]
    build:
      context: ..
      dockerfile: docker/global/Dockerfile
    container_name: mineru-api-hybrid
    restart: always
    ports:
      - "8000:8000"
    environment:
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PREFETCH_MODELS: all
      MINERU_TOOLS_CONFIG_JSON: /root/.mineru/mineru.json
      MINERU_API_ENABLE_FASTAPI_DOCS: "1"
    entrypoint:
      - /bin/bash
      - /app/docker/global/start-with-models.sh
    command:
      - mineru-api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.5"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    volumes:
      - mineru-hf-cache:/root/.cache/huggingface
      - mineru-ms-cache:/root/.cache/modelscope
      - mineru-config:/root/.mineru
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  mineru-gradio-hybrid:
    profiles: ["hybrid"]
    build:
      context: ..
      dockerfile: docker/global/Dockerfile.cpu
    container_name: mineru-gradio-hybrid
    restart: always
    depends_on:
      - mineru-api-hybrid
    ports:
      - "7860:7860"
    environment:
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PREFETCH_MODELS: none
      MINERU_TOOLS_CONFIG_JSON: /root/.mineru/mineru.json
      MINERU_GRADIO_BACKEND_OPTIONS: hybrid-auto-engine
      MINERU_GRADIO_DEFAULT_BACKEND: hybrid-auto-engine
      MINERU_GRADIO_BACKEND_API_URL: http://mineru-api-hybrid:8000
    entrypoint:
      - /bin/bash
      - /app/docker/global/start-with-models.sh
    command:
      - mineru-gradio
      - --server-name
      - 0.0.0.0
      - --server-port
      - "7860"
    volumes:
      - mineru-hf-cache:/root/.cache/huggingface
      - mineru-ms-cache:/root/.cache/modelscope
      - mineru-config:/root/.mineru

volumes:
  mineru-hf-cache:
  mineru-ms-cache:
  mineru-config:
